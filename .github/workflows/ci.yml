name: MLflow Project CI Workflow

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  mlflow-ci-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: "3.12.7"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas==2.2.2 scikit-learn==1.5.0

    - name: Run MLflow Project Task
      run: |
        cd MLProject
        mlflow run . --no-conda

    - name: Upload MLProject to GitHub Artifact
      uses: actions/upload-artifact@v4
      with:
        name: verified-mlproject-folder
        path: MLProject/